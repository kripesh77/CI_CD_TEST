name: Deploy to stage

on:
  push:
    branches:
      - production

jobs:
  redeploy:
    name: Deploying everything to staging
    runs-on: ubuntu-latest

    steps:
      - name: SSH into the server
        run: |
          echo "${{ secrets.SSH_PRIVATE_KEY_PROD }}" > ~/ssh_key
          chmod 600 ~/ssh_key

          mkdir -p ~/.ssh
          touch ~/.ssh/known_hosts

          echo "${{ secrets.KNOWN_HOSTS }}" > ~/.ssh/known_hosts

          ssh -i ~/ssh_key ubuntu@20.219.164.78 << 'EOF'
            cd CI_CD_TEST

            git pull origin production

            sudo pnpm install --force-lockfile
            sudo pnpm run build

            pm2 restart http-server
            pm2 restart web
            pm2 restart ws-server
          EOF
